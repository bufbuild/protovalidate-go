version: v2
modules:
  - path: proto
deps:
  # DO NOT EDIT. This is set via make.
  - buf.build/bufbuild/protovalidate:5dcec42a7ef94f16ac710abcd02271f7
  - buf.build/rodaine/protogofakeit
lint:
  use:
    - STANDARD
  except:
    # chicken-and-egg problem as the buf CLI uses this library to perform this lint.
    - PROTOVALIDATE
breaking:
  use:
    - FILE
